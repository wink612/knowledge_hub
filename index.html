<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>知识分享导航站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#8b5cf6',
                        danger: '#ef4444',
                        success: '#10b981',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .card-hover {
                @apply transition-all duration-300 hover:shadow-lg hover:-translate-y-1;
            }
            .btn-primary {
                @apply bg-primary text-white px-4 py-2 rounded-lg font-medium hover:bg-primary/90 transition-all;
            }
            .btn-danger {
                @apply bg-danger text-white px-3 py-1 rounded text-sm hover:bg-danger/90 transition-all;
            }
            .input-field {
                @apply w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 头部 -->
    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="container mx-auto px-4 py-6">
            <h1 class="text-[clamp(1.8rem,4vw,2.5rem)] font-bold text-center bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">
                知识分享导航站
            </h1>
            <p class="text-center text-gray-600 mt-2">分享优质学习资源，共同进步成长</p>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="container mx-auto px-4 py-8">
        <!-- 添加链接表单 -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4 flex items-center">
                <i class="fa fa-plus-circle text-primary mr-2"></i> 添加新的学习资源
            </h2>
            <form id="addForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 mb-1">网站名称</label>
                        <input type="text" id="siteName" class="input-field" placeholder="例如：MDN Web 文档" required>
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-1">网站链接</label>
                        <input type="url" id="siteUrl" class="input-field" placeholder="https://developer.mozilla.org" required>
                    </div>
                </div>
                <div>
                    <label class="block text-gray-700 mb-1">分类</label>
                    <select id="siteCategory" class="input-field">
                        <option value="编程开发">编程开发</option>
                        <option value="数学学习">数学学习</option>
                        <option value="人工智能">人工智能</option>
                        <option value="工具软件">工具软件</option>
                        <option value="其他资源">其他资源</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-700 mb-1">简介（可选）</label>
                    <textarea id="siteDesc" class="input-field" rows="2" placeholder="简单介绍一下这个网站的用途..."></textarea>
                </div>
                <button type="submit" class="btn-primary w-full md:w-auto">
                    <i class="fa fa-plus mr-1"></i> 添加资源
                </button>
            </form>
        </div>

        <!-- 分类筛选 -->
        <div class="flex flex-wrap gap-2 mb-6">
            <button class="category-btn active px-4 py-2 rounded-full bg-primary text-white" data-category="all">全部</button>
            <button class="category-btn px-4 py-2 rounded-full bg-gray-200 hover:bg-gray-300 transition-all" data-category="编程开发">编程开发</button>
            <button class="category-btn px-4 py-2 rounded-full bg-gray-200 hover:bg-gray-300 transition-all" data-category="数学学习">数学学习</button>
            <button class="category-btn px-4 py-2 rounded-full bg-gray-200 hover:bg-gray-300 transition-all" data-category="人工智能">人工智能</button>
            <button class="category-btn px-4 py-2 rounded-full bg-gray-200 hover:bg-gray-300 transition-all" data-category="工具软件">工具软件</button>
            <button class="category-btn px-4 py-2 rounded-full bg-gray-200 hover:bg-gray-300 transition-all" data-category="其他资源">其他资源</button>
        </div>

        <!-- 资源列表 -->
        <div id="resourcesList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 资源卡片会在这里动态生成 -->
        </div>

        <!-- 空状态 -->
        <div id="emptyState" class="text-center py-16 hidden">
            <i class="fa fa-folder-open-o text-6xl text-gray-300 mb-4"></i>
            <p class="text-gray-500 text-lg">还没有添加任何资源，快来添加第一个吧！</p>
        </div>

        <!-- 加载状态 -->
        <div id="loadingState" class="text-center py-16">
            <i class="fa fa-spinner fa-spin text-4xl text-primary mb-4"></i>
            <p class="text-gray-500">正在加载资源...</p>
        </div>
    </main>

    <!-- 密码验证弹窗 -->
    <div id="passwordModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl p-6 w-full max-w-md mx-4">
            <h3 class="text-xl font-semibold mb-4">验证管理员密码</h3>
            <p class="text-gray-600 mb-4">只有输入正确的密码才能删除此资源</p>
            <input type="password" id="passwordInput" class="input-field mb-4" placeholder="请输入管理员密码">
            <p id="passwordError" class="text-danger text-sm mb-4 hidden">密码错误，请重试</p>
            <div class="flex justify-end gap-3">
                <button id="cancelDelete" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-100 transition-all">取消</button>
                <button id="confirmDelete" class="btn-danger">确认删除</button>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-white border-t mt-16 py-6">
        <div class="container mx-auto px-4 text-center text-gray-500">
            <p>知识分享导航站 © 2026 | 分享知识，传递价值</p>
        </div>
    </footer>

    <script>
        // ====================== 配置区域（你只需要修改这里）======================
        // 管理员密码
        const ADMIN_PASSWORD = '1234';
        
        // 你的Gist ID和文件名（创建Gist后替换这里）
        const GIST_ID = 'd8223700a12f9e7c116fd5b51cf30baa';
        const GIST_FILENAME = 'resources.json';
        // ======================================================================

        // 存储资源的数组
        let resources = [];
        let currentCategory = 'all';
        let deleteIndex = -1;

        // DOM 元素
        const addForm = document.getElementById('addForm');
        const resourcesList = document.getElementById('resourcesList');
        const emptyState = document.getElementById('emptyState');
        const loadingState = document.getElementById('loadingState');
        const categoryBtns = document.querySelectorAll('.category-btn');
        const passwordModal = document.getElementById('passwordModal');
        const passwordInput = document.getElementById('passwordInput');
        const passwordError = document.getElementById('passwordError');
        const cancelDelete = document.getElementById('cancelDelete');
        const confirmDelete = document.getElementById('confirmDelete');

        // 初始化
        async function init() {
            // 从Gist加载资源
            await loadResourcesFromGist();
            // 渲染资源列表
            renderResources();
            // 绑定事件
            bindEvents();
        }

        // 从Gist加载资源
        async function loadResourcesFromGist() {
            try {
                const response = await fetch(`https://api.github.com/gists/${GIST_ID}`);
                const data = await response.json();
                const content = data.files[GIST_FILENAME].content;
                
                if (content.trim() === '') {
                    resources = [];
                } else {
                    resources = JSON.parse(content);
                }
                
                loadingState.classList.add('hidden');
            } catch (error) {
                console.error('加载资源失败:', error);
                loadingState.innerHTML = '<i class="fa fa-exclamation-triangle text-4xl text-danger mb-4"></i><p class="text-gray-500">加载资源失败，请刷新页面重试</p>';
            }
        }

        // 保存资源到Gist
        async function saveResourcesToGist() {
            try {
                await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        files: {
                            [GIST_FILENAME]: {
                                content: JSON.stringify(resources, null, 2)
                            }
                        }
                    })
                });
                return true;
            } catch (error) {
                console.error('保存资源失败:', error);
                alert('保存失败，请重试');
                return false;
            }
        }

        // 渲染资源列表
        function renderResources() {
            resourcesList.innerHTML = '';
            
            // 根据分类筛选
            const filteredResources = currentCategory === 'all' 
                ? resources 
                : resources.filter(r => r.category === currentCategory);

            if (filteredResources.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');

            filteredResources.forEach((resource, index) => {
                const actualIndex = resources.indexOf(resource);
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl shadow-md overflow-hidden card-hover';
                card.innerHTML = `
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-3">
                            <span class="px-3 py-1 bg-primary/10 text-primary text-xs rounded-full">${resource.category}</span>
                            <button class="delete-btn text-gray-400 hover:text-danger transition-all" data-index="${actualIndex}">
                                <i class="fa fa-trash"></i>
                            </button>
                        </div>
                        <h3 class="text-xl font-semibold mb-2">
                            <a href="${resource.url}" target="_blank" class="hover:text-primary transition-colors">
                                ${resource.name}
                            </a>
                        </h3>
                        <p class="text-gray-600 mb-4 line-clamp-2">${resource.desc || '暂无简介'}</p>
                        <div class="flex justify-between items-center text-sm text-gray-500">
                            <span><i class="fa fa-calendar-o mr-1"></i> ${resource.date}</span>
                            <a href="${resource.url}" target="_blank" class="text-primary hover:underline">
                                访问网站 <i class="fa fa-external-link ml-1"></i>
                            </a>
                        </div>
                    </div>
                `;
                resourcesList.appendChild(card);
            });

            // 绑定删除按钮事件
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    deleteIndex = parseInt(e.currentTarget.dataset.index);
                    showPasswordModal();
                });
            });
        }

        // 显示密码验证弹窗
        function showPasswordModal() {
            passwordModal.classList.remove('hidden');
            passwordInput.value = '';
            passwordError.classList.add('hidden');
            passwordInput.focus();
        }

        // 隐藏密码验证弹窗
        function hidePasswordModal() {
            passwordModal.classList.add('hidden');
        }

        // 验证密码并删除
        async function verifyAndDelete() {
            if (passwordInput.value === ADMIN_PASSWORD) {
                // 密码正确，删除资源
                resources.splice(deleteIndex, 1);
                const success = await saveResourcesToGist();
                if (success) {
                    renderResources();
                    hidePasswordModal();
                }
            } else {
                // 密码错误
                passwordError.classList.remove('hidden');
                passwordInput.value = '';
                passwordInput.focus();
            }
        }

        // 绑定所有事件
        function bindEvents() {
            // 添加资源表单提交
            addForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const newResource = {
                    name: document.getElementById('siteName').value.trim(),
                    url: document.getElementById('siteUrl').value.trim(),
                    category: document.getElementById('siteCategory').value,
                    desc: document.getElementById('siteDesc').value.trim(),
                    date: new Date().toLocaleDateString()
                };

                resources.unshift(newResource);
                const success = await saveResourcesToGist();
                if (success) {
                    renderResources();
                    addForm.reset();
                    alert('资源添加成功！所有人都能看到了');
                }
            });

            // 分类筛选按钮
            categoryBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    categoryBtns.forEach(b => {
                        b.classList.remove('active', 'bg-primary', 'text-white');
                        b.classList.add('bg-gray-200');
                    });
                    btn.classList.add('active', 'bg-primary', 'text-white');
                    btn.classList.remove('bg-gray-200');
                    
                    currentCategory = btn.dataset.category;
                    renderResources();
                });
            });

            // 密码弹窗事件
            cancelDelete.addEventListener('click', hidePasswordModal);
            confirmDelete.addEventListener('click', verifyAndDelete);
            
            // 按回车键确认密码
            passwordInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    verifyAndDelete();
                }
            });

            // 点击弹窗外部关闭
            passwordModal.addEventListener('click', (e) => {
                if (e.target === passwordModal) {
                    hidePasswordModal();
                }
            });
        }

        // 启动应用
        init();
    </script>
</body>
</html>
