<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Hub - 云端知识分享</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.25.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.25.0/firebase-firestore-compat.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen transition-colors">

  <!-- 导航 -->
  <nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-gray-200 dark:border-gray-700">
    <div class="container mx-auto flex justify-between items-center px-4 py-3">
      <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-purple-600 flex items-center space-x-2">
        <i class="fa fa-lightbulb-o"></i> Knowledge Hub
      </span>
      <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
        <i class="fa fa-moon-o dark:hidden"></i>
        <i class="fa fa-sun-o hidden dark:inline"></i>
      </button>
    </div>
  </nav>

  <main class="container mx-auto px-4 pt-24 pb-16">
    <!-- 搜索 & 分类 -->
    <div class="max-w-3xl mx-auto mb-6">
      <input id="search-input" type="text" placeholder="搜索知识..." class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 focus:outline-none mb-4">
      <div id="category-filters" class="flex flex-wrap gap-2 justify-center mb-6">
        <button class="category-btn active px-4 py-2 rounded-full bg-blue-500 text-white" data-category="all">全部</button>
        <button class="category-btn px-4 py-2 rounded-full bg-gray-200 dark:bg-gray-700" data-category="programming">编程</button>
        <button class="category-btn px-4 py-2 rounded-full bg-gray-200 dark:bg-gray-700" data-category="math">数学</button>
        <button class="category-btn px-4 py-2 rounded-full bg-gray-200 dark:bg-gray-700" data-category="ai">人工智能</button>
        <button class="category-btn px-4 py-2 rounded-full bg-gray-200 dark:bg-gray-700" data-category="tools">工具技巧</button>
        <button class="category-btn px-4 py-2 rounded-full bg-gray-200 dark:bg-gray-700" data-category="other">其他</button>
      </div>
    </div>

    <!-- 知识网格 -->
    <div id="knowledge-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    <div id="empty-state" class="hidden text-center py-16">
      <i class="fa fa-search text-6xl text-gray-300 dark:text-gray-600 mb-4"></i>
      <h3 class="text-xl font-medium mb-2">没有找到相关知识</h3>
    </div>
  </main>

  <!-- 浮动添加按钮 -->
  <button id="add-btn" class="fixed bottom-8 right-8 w-14 h-14 rounded-full gradient-bg text-white flex items-center justify-center hover:scale-110 z-40">
    <i class="fa fa-plus"></i>
  </button>

  <!-- 添加知识模态框 -->
  <div id="add-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all">
    <div class="bg-white dark:bg-gray-800 rounded-xl w-full max-w-2xl p-6 transform scale-95 transition-transform">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold">添加新知识</h2>
        <button id="close-modal" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
          <i class="fa fa-times"></i>
        </button>
      </div>
      <form id="knowledge-form" class="space-y-4">
        <input type="text" id="title" placeholder="标题" required class="w-full px-4 py-2 border rounded-lg dark:border-gray-600 dark:bg-gray-700">
        <select id="category" required class="w-full px-4 py-2 border rounded-lg dark:border-gray-600 dark:bg-gray-700">
          <option value="programming">编程</option>
          <option value="math">数学</option>
          <option value="ai">人工智能</option>
          <option value="tools">工具技巧</option>
          <option value="other">其他</option>
        </select>
        <textarea id="content" placeholder="正文内容，可以插入HTML、图片URL或视频iframe" rows="4" required class="w-full px-4 py-2 border rounded-lg dark:border-gray-600 dark:bg-gray-700"></textarea>
        <input type="text" id="tags" placeholder="标签，用逗号分隔" class="w-full px-4 py-2 border rounded-lg dark:border-gray-600 dark:bg-gray-700">
        <div class="flex justify-end gap-3">
          <button type="button" id="cancel-add" class="px-4 py-2 border rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">取消</button>
          <button type="submit" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // ======== Firebase 配置 ========
    const firebaseConfig = {
      apiKey: "你的API_KEY",
      authDomain: "你的项目.firebaseapp.com",
      projectId: "你的项目ID",
      storageBucket: "你的项目.appspot.com",
      messagingSenderId: "你的ID",
      appId: "你的ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const knowledgeGrid = document.getElementById('knowledge-grid');
    const addBtn = document.getElementById('add-btn');
    const addModal = document.getElementById('add-modal');
    const closeModal = document.getElementById('close-modal');
    const cancelAdd = document.getElementById('cancel-add');
    const knowledgeForm = document.getElementById('knowledge-form');
    const searchInput = document.getElementById('search-input');
    const categoryFilters = document.getElementById('category-filters');
    const emptyState = document.getElementById('empty-state');

    let currentCategory = 'all';

    // 显示/隐藏模态框
    addBtn.addEventListener('click', ()=>{ addModal.classList.remove('opacity-0','pointer-events-none'); addModal.querySelector('div').classList.remove('scale-95'); addModal.querySelector('div').classList.add('scale-100'); });
    closeModal.addEventListener('click', ()=>{ addModal.classList.add('opacity-0','pointer-events-none'); addModal.querySelector('div').classList.remove('scale-100'); addModal.querySelector('div').classList.add('scale-95'); });
    cancelAdd.addEventListener('click', ()=>{ addModal.classList.add('opacity-0','pointer-events-none'); addModal.querySelector('div').classList.remove('scale-100'); addModal.querySelector('div').classList.add('scale-95'); });

    // 添加知识
    knowledgeForm.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const newItem = {
        title: document.getElementById('title').value,
        category: document.getElementById('category').value,
        content: document.getElementById('content').value,
        tags: document.getElementById('tags').value.split(',').map(t=>t.trim()),
        date: new Date().toISOString().split('T')[0]
      };
      await db.collection('knowledge').add(newItem);
      addModal.classList.add('opacity-0','pointer-events-none');
      knowledgeForm.reset();
    });

    // 实时监听 Firestore 数据
    db.collection('knowledge').orderBy('date','desc').onSnapshot(snapshot=>{
      knowledgeGrid.innerHTML = '';
      const docs = snapshot.docs;
      if(docs.length===0){ emptyState.classList.remove('hidden'); return; }
      emptyState.classList.add('hidden');

      docs.forEach(doc=>{
        const data = doc.data();
        const card = document.createElement('div');
        card.className='bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden card-hover p-4';
        card.innerHTML = `
          <div class="flex justify-between mb-2">
            <span class="px-2 py-1 rounded-full bg-blue-100 text-blue-500 text-xs">${data.category}</span>
            <span class="text-xs text-gray-500 dark:text-gray-400">${data.date}</span>
          </div>
          <h3 class="font-bold mb-2">${data.title}</h3>
          <div class="mb-2">${data.content}</div>
          <div class="flex gap-2 mt-2">${data.tags?.map(tag=>`<span class="px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded text-xs">${tag}</span>`).join('')}</div>
        `;
        knowledgeGrid.appendChild(card);
      });
    });
  </script>
</body>
</html>
